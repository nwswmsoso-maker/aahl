<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجمع الحليم للأقمشة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d0d2b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 144, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 136, 0.2) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1;
            animation: backgroundPulse 8s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.8; filter: blur(40px); }
            50% { opacity: 1; filter: blur(60px); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
        }

        /* Main Card */
        .card {
            background: rgba(15, 15, 40, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 70px 50px;
            box-shadow: 
                0 8px 32px rgba(31, 38, 135, 0.37),
                0 0 60px rgba(138, 43, 226, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            animation: slideUp 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05), transparent 70%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(80px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand Section */
        .brand {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
            z-index: 3;
        }

        .logo-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-25px) rotateZ(5deg); }
        }

        .brand h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 25%, #ffd700 50%, #00d4ff 75%, #00ff88 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 5s ease infinite;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            letter-spacing: -1px;
            margin-bottom: 15px;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .brand p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section */
        .section {
            margin-bottom: 50px;
            position: relative;
            z-index: 3;
            animation: slideInUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.4s; }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .title-icon {
            font-size: 28px;
            animation: bounce 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.5));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.1); }
        }

        .section p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 19px;
            line-height: 2;
            margin: 8px 0;
            font-weight: 500;
        }

        .address-box {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.25), rgba(30, 144, 255, 0.25));
            padding: 25px;
            border-radius: 18px;
            border-left: 5px solid #00ff88;
            margin-top: 15px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.1);
        }

        .address-box:hover {
            transform: translateX(-8px) translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.3);
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.35), rgba(30, 144, 255, 0.35));
            border-left-width: 6px;
        }

        /* Social Links */
        .social-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .social-link {
            position: relative;
            padding: 35px 25px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            overflow: hidden;
            text-align: center;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        /* TikTok */
        .social-link.tiktok {
            background: linear-gradient(135deg, #25f4ee, #ff0050);
            box-shadow: 0 12px 35px rgba(255, 0, 80, 0.5);
        }

        /* Instagram */
        .social-link.instagram {
            background: linear-gradient(135deg, #feda75, #fa7e1e, #d92e7f, #9b36b7);
            background-size: 300% 300%;
            box-shadow: 0 12px 35px rgba(212, 51, 140, 0.5);
            animation: instaGradient 4s ease infinite;
        }

        @keyframes instaGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .social-link-icon {
            font-size: 32px;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .social-link-text {
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: -1;
        }

        .social-link:hover {
            transform: translateY(-14px) scale(1.08);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .social-link:hover .social-link-icon {
            transform: scale(1.4) rotate(15deg);
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:active {
            transform: translateY(-8px) scale(0.96);
        }

        /* Responsive */
        @media (max-width: 700px) {
            .card {
                padding: 50px 35px;
                border-radius: 30px;
            }

            .brand h1 {
                font-size: 40px;
            }

            .logo-icon {
                font-size: 70px;
            }

            .section p {
                font-size: 17px;
            }

            .social-link {
                padding: 28px 20px;
                font-size: 15px;
            }

            .social-link-icon {
                font-size: 30px;
            }
        }

        @media (max-width: 500px) {
            .card {
                padding: 40px 25px;
                border-radius: 25px;
            }

            .brand h1 {
                font-size: 32px;
            }

            .logo-icon {
                font-size: 60px;
            }

            .section-title {
                font-size: 12px;
                letter-spacing: 2px;
            }

            .section p {
                font-size: 16px;
                line-height: 1.8;
            }

            .social-link {
                padding: 25px 18px;
                font-size: 14px;
            }

            .social-link-icon {
                font-size: 28px;
            }

            .social-links {
                gap: 15px;
            }
        }

        /* Glow Effects */
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 136, 0.5), 0 0 20px rgba(0, 255, 136, 0.3); }
            50% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.8), 0 0 40px rgba(0, 255, 136, 0.5); }
        }

        .glow {
            animation: textGlow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Brand Section -->
            <div class="brand">
                <div class="logo-icon">🧵✨</div>
                <h1>مجمع الحليم<br>للأقمشة</h1>
                <p>أفضل الأقمشة الفاخرة بجودة عالية</p>
            </div>

            <!-- Address Section -->
            <div class="section">
                <div class="section-title">
                    <span class="title-icon">📍</span>
                    عنواننا
                </div>
                <div class="address-box">
                    <p><strong>الرمادي - زنكوره</strong></p>
                    <p>قرب مدرسة الجهاد الابتدائية</p>
                </div>
            </div>

            <!-- Social Section -->
            <div class="section">
                <div class="section-title">
                    <span class="title-icon">💬</span>
                    تابعنا
                </div>
                <div class="social-links">
                    <a href="https://www.tiktok.com/@ad_ha30?_r=1&_t=ZS-96z8z9Hq99p" class="social-link tiktok" target="_blank" title="تيك توك">
                        <i class="fab fa-tiktok social-link-icon"></i>
                        <span class="social-link-text">تيك توك</span>
                    </a>
                    <a href="https://www.instagram.com/mjmlhlym?igsh=MzFhOHhyOG55MXFr&utm_source=qr" class="social-link instagram" target="_blank" title="انستغرام">
                        <i class="fab fa-instagram social-link-icon"></i>
                        <span class="social-link-text">انستغرام</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
